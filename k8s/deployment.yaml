apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-platform
  namespace: job-platform
  labels:
    app: job-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: job-platform
  template:
    metadata:
      labels:
        app: job-platform
    spec:
      containers:
      - name: job-platform
        image: job-platform:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
        envFrom:
        - configMapRef:
            name: job-platform-config
        env:
        - name: EMAIL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: job-platform-secret
              key: EMAIL_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: job-platform-secret
              key: JWT_SECRET
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: data
          mountPath: /app/data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: job-platform-data
      restartPolicy: Always

version: '3.8'

services:
  app:
    build: .
    container_name: job-platform
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # 邮件配置（可选）
      # - SMTP_HOST=smtp.qq.com
      # - SMTP_PORT=587
      # - SMTP_USER=your-email@qq.com
      # - SMTP_PASS=your-password
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 可选：使用Nginx反向代理
  # nginx:
  #   image: nginx:alpine
  #   container_name: job-platform-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf
  #     - ./ssl:/etc/nginx/ssl
  #   depends_on:
  #     - app
  #   restart: unless-stopped
